{% extends "base.html" %}
{% load custom_filters %}

{% block title %}App{% endblock %}

{% block extra_head %}
<style>
    @keyframes pulse-scale {
        0%, 100% {
            transform: scale(1);
            opacity: 1;
        }
        50% {
            transform: scale(1.3);
            opacity: 0.7;
        }
    }

    @keyframes pulse-halo {
        0% {
            transform: scale(1);
            opacity: 0.6;
        }
        100% {
            transform: scale(2);
            opacity: 0;
        }
    }

    .animate-pulse-scale {
        animation: pulse-scale 2s infinite;
    }

    .animate-pulse-halo {
        animation: pulse-halo 2s infinite;
    }

    #pulsating-dot {
        transition: opacity 0.8s ease-in-out;
    }
</style>
{% endblock %}

{% block content %}
<div class="container flex justify-center min-h-screen min-w-screen bg-gray-100">
    <div class="card-container flex flex-col self-center rounded-xl min-w-84 bg-white drop-shadow-md">
        <div class="card-header p-3 border-b border-solid border-gray-300 flex justify-between items-center">
            <h1 class="mx-1 text-base font-medium">Mi tiempo trabajado</h1>
            <a href="{% url 'admin:index' %}">
                <div style="color: silver;"
                    class="corner-icon inline-flex items-center p-1.5 mx-0.5 rounded-full bg-[rgba(174, 174, 184, 1)] hover:bg-[rgba(28,36,43,0.08)] transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 448 512">
                        <path fill="currentColor"
                              d="M224 256c70.7 0 128-57.3 128-128S294.7 0 224 0S96 57.3 96 128s57.3 128 128 128m89.6 32h-16.7c-22.2 10.2-46.9 16-72.9 16s-50.6-5.8-72.9-16h-16.7C60.2 288 0 348.2 0 422.4V464c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48v-41.6c0-74.2-60.2-134.4-134.4-134.4"/>
                    </svg>
                </div>
            </a>
        </div>
        <div class="card-body flex flex-col justify-end content-end min-h-32 p-3">
            <div class="flex-col mx-1">
                <p class="text-gray-600 text-lg font-medium">Total hoy: </p>
                <div class="flex justify-between items-center">
                    <div class="timer flex items-center">
                        <p id="time-counter"
                           class="mr-6 text-gray-900 font-bold text-3xl">{{ total_seconds_today|format_time }}</p>
                        <div id="pulsating-dot" class="relative flex items-center justify-center w-3 h-3">
                            <!-- Círculo principal -->
                            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse-scale"></div>
                            <!-- Halo -->
                            <div class="absolute w-4 h-4 bg-green-500 rounded-full opacity-50 animate-pulse-halo"></div>
                        </div>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <button type="submit"
                                class="my-2 bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-full">
                            {% if active_period_start_time %}
                                Detener
                            {% else %}
                                Iniciar
                            {% endif %}
                        </button>
                    </form>
                </div>

            </div>
            <div>


            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let timerInterval;
    let totalSeconds = Math.floor({{ total_seconds_today }});

    let activePeriodStartTime = "{{ active_period_start_time }}";
    let isTimerRunning = false;

    // Esta función se encargará de actualizar el contador en tiempo real
    function startTimer() {
        toggleDot();
        isTimerRunning = true;
        timerInterval = setInterval(function () {
            totalSeconds += 1; // Incrementa el contador cada segundo
            updateTimeDisplay();
        }, 1000);
    }

    function stopTimer() {
        toggleDot();
        clearInterval(timerInterval); // Detener el contador
        isTimerRunning = false;
        updateTimeDisplay();
    }

    function toggleDot() {
        const dot = document.getElementById("pulsating-dot");
        if (dot.style.opacity === "0") {
            dot.style.opacity = "1";
            dot.style.pointerEvents = "auto";
        } else {
            dot.style.opacity = "0";
            dot.style.pointerEvents = "none";
        }
    }

    function updateTimeDisplay() {
        let roundedTotalSeconds = Math.floor(totalSeconds)
        let hours = Math.floor(roundedTotalSeconds / 3600);
        let minutes = Math.floor((roundedTotalSeconds % 3600) / 60);
        let formattedTime = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;

        document.getElementById('time-counter').textContent = formattedTime;
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById("pulsating-dot").style.opacity = "0";
        document.getElementById("pulsating-dot").style.pointerEvents = "none";
        updateTimeDisplay(); // Aseguramos que el tiempo siempre se muestre correctamente desde el inicio
        if (activePeriodStartTime && !isTimerRunning) {
            startTimer(); // Si hay un periodo activo, iniciar el contador
        }
        if (activePeriodStartTime === 'None') {
            stopTimer();
        }
    })

    document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
            console.log("La pestaña ha vuelto a estar activa. Actualizando contador...");

            // Llamada a tu API para obtener el tiempo actualizado
            fetch("{% url 'get-total-seconds-today' %}")
                .then((response) => response.json())
                .then((json) => {
                    console.log(json)
                    totalSeconds = json.total_seconds_today
                })
                .catch(error => console.error("Error al obtener el tiempo:", error));
        }
    });
</script>
{% endblock %}
